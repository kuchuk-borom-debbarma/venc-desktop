<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>VENC — File Encryptor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="logo">AES-256 · Native</div>
        <h1>VENC</h1>
        <p>Encrypt any file — single or batch</p>
    </header>

    <div class="card">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('encrypt')">⬡ Encrypt</button>
            <button class="tab" onclick="switchTab('decrypt')">⬡ Decrypt</button>
        </div>

        <!-- ENCRYPT PANEL -->
        <div class="panel active" id="panel-encrypt">
            <div class="drop-zone" id="enc-drop" onclick="pickEncryptFiles()">
                <div class="drop-icon">▲</div>
                <div class="drop-label">Click to choose files</div>
                <div class="drop-sub">any file type · multi-select supported</div>
            </div>
            <div class="file-list-wrap" id="enc-file-list-wrap">
                <div class="file-list" id="enc-file-list"></div>
                <button class="add-more-btn" onclick="pickEncryptFiles(true)">+ Add more files</button>
            </div>
            <div class="field">
                <label>Password</label>
                <div class="pw-wrap">
                    <input type="password" id="enc-pw" placeholder="Enter a strong password"
                        autocomplete="new-password">
                    <button class="pw-toggle" onclick="togglePw('enc-pw', this)">show</button>
                </div>
            </div>
            <div class="field">
                <label>Confirm password</label>
                <div class="pw-wrap">
                    <input type="password" id="enc-pw2" placeholder="Repeat password" autocomplete="new-password">
                    <button class="pw-toggle" onclick="togglePw('enc-pw2', this)">show</button>
                </div>
            </div>
            <div class="batch-label" id="enc-batch-label"></div>
            <div class="progress-bar" id="enc-prog">
                <div class="fill" id="enc-prog-fill"></div>
            </div>
            <div class="status" id="enc-status"></div>
            <div class="result-list" id="enc-result-list"></div>
            <button class="btn" id="enc-btn" onclick="doEncryptAll()">⬡ Encrypt &amp; Save All</button>
        </div>

        <!-- DECRYPT PANEL -->
        <div class="panel" id="panel-decrypt">
            <div class="drop-zone" id="dec-drop" onclick="pickDecryptFiles()">
                <div class="drop-icon">▽</div>
                <div class="drop-label">Click to choose .venc files</div>
                <div class="drop-sub">.venc files · multi-select supported</div>
            </div>
            <div class="file-list-wrap" id="dec-file-list-wrap">
                <div class="file-list" id="dec-file-list"></div>
                <button class="add-more-btn" onclick="pickDecryptFiles(true)">+ Add more files</button>
            </div>
            <div class="field">
                <label>Password</label>
                <div class="pw-wrap">
                    <input type="password" id="dec-pw" placeholder="Enter decryption password"
                        autocomplete="current-password">
                    <button class="pw-toggle" onclick="togglePw('dec-pw', this)">show</button>
                </div>
            </div>
            <div class="batch-label" id="dec-batch-label"></div>
            <div class="progress-bar" id="dec-prog">
                <div class="fill" id="dec-prog-fill"></div>
            </div>
            <div class="status" id="dec-status"></div>
            <div class="result-list" id="dec-result-list"></div>
            <button class="btn" id="dec-btn" onclick="doDecryptAll()">⬡ Decrypt All</button>
        </div>
    </div>

    <footer>
        AES-256-GCM · PBKDF2 / 250k iterations · <span>everything happens on this device — no uploads</span>
    </footer>

    <script src="renderer.js"></script>
</body>

</html>
